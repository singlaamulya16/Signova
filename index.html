<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signova</title>
    <!-- Google Fonts: Orbitron & Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particles-bg"></canvas>
    
    <div class="landing-container">
        <div class="glass-panel text-center pulse-glow">
            <h1 class="orbitron neon-text title-large">SIGNOVA</h1>
            <p class="subtitle mb-6 text-gray-300">Real-Time Sign Language Translation via Computer Vision</p>
            
            <div class="features-grid mb-8 text-left">
                <div class="feature-item">
                    <span class="neon-icon">⏺</span> Client-Side Processing
                </div>
                <div class="feature-item">
                    <span class="neon-icon">⚡</span> Zero Latency
                </div>
                <div class="feature-item">
                    <span class="neon-icon">🗣️</span> Voice Output
                </div>
                <div class="feature-item">
                    <span class="neon-icon">✋</span> 21-Point Tracking
                </div>
            </div>

            <a href="translate.html" class="cyber-btn mt-6">
                <span>INITIALIZE SYSTEM</span>
            </a>
        </div>
    </div>

    <!-- Particle Background Script -->
    <script>
        const canvas = document.getElementById('particles-bg');
        const ctx = canvas.getContext('2d');
        let particlesArray;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = '#22c55e';
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 20000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 1) - 0.5;
                let directionY = (Math.random() * 1) - 0.5;
                let color = '#22c55e';
                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
        }
        init();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = innerWidth;
            canvas.height = innerHeight;
            init();
        });
    </script>
</body>
</html>
